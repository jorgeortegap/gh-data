name: Deploy website
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-slim
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Publish JS filename
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'
        id: publish
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-files
          path: dist/**
          # path: |
          #   dist/**
          #   package.json
  deploy:
    needs: build
    runs-on: ubuntu-slim
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-files
      - name: Output build artifacts
        run: ls -ltrha
      - name: Output
        run: echo "${{ needs.build.outputs.script-file }}"
      - name: Deploy
        run: echo " Deploying..."