name: Deploy website
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-slim
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-files
          path: dist/**
          # path: |
          #   dist/**
          #   package.json
  deploy:
    needs: build
    runs-on: ubuntu-slim
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-files
      - name: Output build artifacts
        run: ls -al dist